[package]
name = "voiid-e2e-core"
version = "0.1.0"
edition = "2021"
description = "Voiid end-to-end encryption core. The single cross-platform crypto implementation shared by iOS, Android, and (later) web."
license = "UNLICENSED"
publish = false

[lib]
# `cdylib` -> Android JNI .so and the dylib used for binding generation;
# `staticlib` -> the .a archives linked into the iOS XCFramework;
# `rlib` -> lets the Rust test suite link against the crate directly.
crate-type = ["cdylib", "staticlib", "rlib"]

[dependencies]
# Permissively licensed (Apache-2.0) Signal-style double-ratchet implementation.
# This is what lets Voiid stay closed-source: NO AGPL, NO libsignal.
vodozemac = "0.10"

# Error handling + (de)serialization for values that cross the FFI boundary.
thiserror = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rand = "0.8"

# Phase 2 media: authenticated symmetric encryption for attachment blobs.
aes-gcm = "0.10"
sha2 = "0.10"

# Phase 3 groups: MLS (RFC 9420) via OpenMLS (Apache-2.0).
# The libcrux provider supplies the formally-verified ML-KEM used by the hybrid
# post-quantum X-Wing ciphersuite; the RustCrypto provider does NOT support it.
openmls = "0.8"
openmls_libcrux_crypto = "0.3"
openmls_basic_credential = "0.5"
openmls_traits = "0.5"

# Phase 4 calls: HKDF to derive SRTP key material from an exchanged secret.
hkdf = "0.12"

# FFI: one definition generates Swift (iOS) and Kotlin (Android) bindings.
uniffi = { version = "0.31", features = ["cli"] }

# Post-quantum 1:1 (GATED). FIPS-203 ML-KEM (RustCrypto, Apache/MIT). Used only
# for PQ PREKEY material today; the handshake combiner is NOT active — see the
# `pq-1to1-activate` gate in src/pqxdh.rs. Optional so the default build is
# unchanged.
ml-kem = { version = "0.3", optional = true, features = ["getrandom"] }

[features]
default = ["pq-1to1-prekeys"]
# Generate/transport ML-KEM prekeys (safe: no bespoke handshake crypto).
pq-1to1-prekeys = ["dep:ml-kem"]
# DANGER: activating the 1:1 PQ handshake COMBINER. Left unbuildable on purpose
# until an external cryptographic review signs off. See src/pqxdh.rs.
pq-1to1-activate = ["pq-1to1-prekeys"]

[dev-dependencies]
# Tests only; never shipped in the app.

[[bin]]
# Binding generator: `cargo run --bin uniffi-bindgen generate ...`
name = "uniffi-bindgen"
path = "src/bin/uniffi-bindgen.rs"
